name: Test cucumber-core

permissions: {}

on:
  push:
    branches:
      - main
      - renovate/**
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 5 * * *"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        ruby: ['3.2', '3.3', '3.4', '3.5']
        include:
          - os: ubuntu-latest
            ruby: jruby
          - os: macos-latest
            ruby: '3.4'
          - os: windows-latest
            ruby: '3.4'

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@95ef2b042f9d7a56d8268cba8559e2842e2ad01b # v1.321.0
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Run tests
        run: bundle exec rake
        shell: bash
